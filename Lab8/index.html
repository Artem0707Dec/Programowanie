            class ComplexNumber {
                constructor(real, imaginary) {
                    this.real = real;
                    this.imaginary = imaginary;
                }
                wypisz(){
                    if (this.imaginary<0){
                    return
                    `${this.real} - ${Math.abs(this.imaginary)}i`;
                } else {
                    return `${this.real} + ${this.imaginary}i`;
                }
                }
                module() {
                    return Math.sqrt(Math.pow(this.real, 2)+ Math.pow(this.imaginary, 2));
                }
            }
            function generateComplexArrey(size) {
                const arr = [];
                for (let i=0; i< size;i++) {
                    const r = Math.floor(Math.random() * 21)-10;
                    const im=Math.floor(Math.random()*21)-10;
                    arr.push(new
                    ComplexNumber(r,im));
                }
                return arr;
            }
            const complexNumbers=generateComplexArrey(5);
            complexNumbers.forEach(num=>console.log(`${num.wypisz()}(Moduł: ${num.module().toFixed(2)})`));
            const positiveOnly=complexNumbers.filter(num=>num.real>0 && num.imaginary>0);
            positiveOnly.forEach(num => console.log(num.wypisz()));
            const swappedParts=complexNumbers.map(num => new
            ComplexNumber(num.imaginary, num.real));
            swappedParts.forEach(num => console.log(num.wypisz()));
            const sumOfModules = complexNumbers.reduce((sum, num)=> sum + num.module(), 0);
            console.log(`\nWynik: ${sumOfModules.toFixed(2)}`);
            const minModule=complexNumbers.reduce((min, num)=> Math.min(min, num.module()), Infinity);
            console.log(`\nWynik:${minModule.toFixed(2)}`);
