<html>
    <head>
        <meta charset="UTF-8">
        <title>Dzielenie z obsługą wyjątków</title>
        <style>
            body {
                font-family: Arial, sans-serif; line-height: 1.6;
                max-width: 400px; margin: 30px auto;
            }
            .box {
                border: 1px solid #ccc;
                padding: 20px; border-radius: 8px;
            }
            .form-row {
                margin-bottom: 12px;
            }
            label {
                display: inline-block;
                width: 120px; font-weight: bold;
            }
            .message {
                margin-top: 15px;
                font-weight: bold;
            }
            .error {
                color: #d9534f;
            }
            .success {
                color: #5cb85c;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h2>Kalkulator dzielenia</h2>
            <div class="form-row">
                <label for="num1">Liczba dzielona:</label>
                <input type="number" id="num1" step="any" placeholder="np.10.5">
            </div>
            <div class="form-row">
                <label for="num2">Dzielnik:</label>
                <input type="number" id="num2" step="any" placeholder="np.2">
            </div>
            <button type="button" onclick="obliczDzielenie()">Podziel</button>
            <div id="wynik" class="message"></div>
        </div>
        <script>
            function obliczDzielenie() {
                const num1Str =document.getElementById('num1').value;
                const num2Str =document.getElementById('num2').value;
                const resultDiv = document.getElementById('wynik');
                resultDiv.className = "message error";
                try {
                    if (num1Str ===""|| num2Str ==="")
                {throw new Error("Pola nie mogą być puste.");
                }
                const num1 = parseFloat(num1Str);
                const num2 = parseFloat(num2Str);
                if (num2===0){
                    throw new Error("Nie można dzielić przez zero!");
                }
                const wynik = num1/num2;
                resultDiv.className="message success";
                resultDiv.innerText="Wynik: " + wynik;
                }
                catch (e){
                    resultDiv.innerText="Błąd: " + e.message; 
                }
            }
        </script>
    </body>
</html>
