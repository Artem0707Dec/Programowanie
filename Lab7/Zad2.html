<html>
    <head>
        <meta charset="UTF-8">
    <title>Formularz Rejestracji</title>
    <style>
        body {
            font-family: arial, sans-serif; line-height: 1.6; max-width: 600px;
            margin: 30px auto;
        }
        .box {
            border: 1px solid #ccc;
            padding: 20px; border-radius: 8px;
        }
        .form-row {
            margin-bottom: 15px;
        }
        label {
            display: inline-block; width: 180px;
            font-weight: bold; vertical-align: top;
        }
        .message {
            margin-top: 15px;
            font-weight: bold;
        }
        .error {
            color:#d9534f
        }
        .output-block {
            background:#f9f9f9; padding: 15px;
            border-left: 4px solid #5cb85c;
            margin-top: 15px;
            font-weight: normal;
        }
        .output-block strong {
            color:#5cb85c
        }
    </style>
    </head>
    <body>
        <div class="box">
            <h2>Formularz Rejestracji</h2>
            <form id="regForm">
                <div class="form-row">
                    <label for="username">Nazwa użytkownika:</label>
                    <input type="text" id="username" name="username">
                </div>
                <div class="form-row">
                    <label for="email">Adres e-mail:</label>
                    <input type="text" id="email" name="email" placeholder="adres@domena.pl">
                </div>
                <div class="form-row">
                    <label for="password">Hasło</label>
                    <input type="password" id="password" name="password">
                </div>
                <div class="form-row">
                    <label for="passwordConf">Powtórz hasło:</label>
                    <input type="password" id="passwordConf" name="passwordConf">
                </div>
                <div class="form-row">
                    <label for="dob">Data urodzenia</label>
                    <input type="date" id="dob" name="dob">
                </div>
                <div class="form-row">
                    <label for="gender">Płeć:</label>
                    <select id="gender" name="gender">
                        <option value="">--Wybierz--</option>
                        <option value="Mężczyzna">Mężczyzna</option>
                        <option value="Kobieta">Kobieta</option>
                        <option value="Nie chcę podawać">Nie chcę podawać</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Wersja:</label>
                    <div style="display: inline-block;">
                        <input type="radio" id="v1" name="version" value="Wersja darmowa">
                        <label for="v1" style="width: auto; font-weight: normal;">Wersja darmowa</label><br>
                        <input type="radio" name="version" id="v2" value="Wersja standardowa">
                        <label for="v2" style="width: auto; font-weight: normal;">Wersja standardowa</label><br>
                        <input type="radio" name="version" value="Wersja premium" id="v3">
                        <label for="v3" style="width: auto; font-weight: normal;">Wersja premium</label>
                    </div>
                </div>
                <div class="form-row">
                    <input type="checkbox" id="terms" name="terms">
                    <label for="terms" style="width: auto; font-weight: normal;">Akceptuję regulamin</label>
                </div>
                <div style="margin-top: 20px;">
                    <button type="button" onclick="walidujFormularz()">Zarejestruj się</button>
                    <button type="reset" onclick="wyczyscKomunikaty()">Wyczyść</button>
                </div>
            </form>
            <div id="wynik" class="message">
            </div>
        </div>
        <script>
            function walidujFormularz(){
                const username=document.getElementById('username').value.trim();
                const email=document.getElementById('email').value.trim();
                const password=document.getElementById('password').value;
                const passwordConf=document.getElementById('passwordConf').value;
                const dob=document.getElementById('dob').value;
                const gender=document.getElementById('gender').value;
                const terms=document.getElementById('terms').checked;
                const versionRadios=document.getElementsByName('version');
                const resultDiv=document.getElementById('wynik');
                let selectedVersion= null;
                for (let radio of versionRadios){
                    if (radio.checked){
                        selectedVersion=radio.value;
                        break
                    }
                }
                resultDiv.className="message error";
                if (!username || !email || !password|| !passwordConf || !dob ||!gender||!selectedVersion||!terms){
                    resultDiv.innerText="Błąd: Wszystkie pola muszą być wypełnione, a regulamin zaakceptowany.";
                    return;
                }
                const usernameRegex = /^[a-zA-Z0-9]+$/;
                if (!usernameRegex.test(username)){
                    resultDiv.innerText="Błąd: Nazwa użytkownika może zawierać tylko litery i cyfry(bez spacji i znaków specjalnych).";
                    return;
                }
                if (password.length <8) {
                    resultDiv.innerText="Błąd: Hasło musi składać się z co najmniej 8 znaków.";
                    return;
                }
                if (!/\d/.test(password)){
                    resultDiv.innerText="Błąd: Hasło musi zawierać co najmniej jedną cyfrę.";
                    return;
                }
                if (password !==passwordConf){
                    resultDiv.innerText="Błąd: Podane hasła nie są identyczne.";
                    return;
                }
                
            }
        </script>
    </body>
</html>
