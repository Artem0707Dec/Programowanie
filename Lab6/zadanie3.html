<html>
    <head>
        <meta charset="utf-8">
        <title>Aktualnu czas w Polsce</title>
        <style>
            body{font-family: sans-serif; text-align: center; margin-top: 50px;}
            #czas_z_api {font-size: 24px; font-weight: bold; color: #333;}
        </style>
    </head>
    <body>
        <h1>Aktualny czas dla strefy Europe/Warsaw</h1>
        <div id="czas_z_api">Ładowanie danych z Timeapi.io...</div>
        <script>
            const apiUrl = 'https://timeapi.io/api/Time/current/zone?timeZone=Europe/Warsaw';
            fetch(apiUrl)
            .then(Response => Response.json())
            .then(data => {
                const displayDiv = document.getElementById('czas_z_api');
                displayDiv.innerHTML=`Dzisiejsza data: ${data.date} <br> Godzina: ${data.time}`;
            });
        </script>
    </body>
</html>
